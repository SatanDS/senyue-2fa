services:
  senyue-2fa-api:
    build: ./api
    container_name: senyue-2fa-api
    restart: unless-stopped
    environment:
      PORT: 3000
      DATA_DIR: /data
    volumes:
      - senyue-2fa-data:/data

  senyue-2fa:
    image: nginx:1.27-alpine
    container_name: senyue-2fa
    restart: unless-stopped
    depends_on:
      - senyue-2fa-api
    ports:
      - "8070:80"
    volumes:
      - ./app:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  senyue-2fa-data: